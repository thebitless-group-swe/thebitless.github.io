<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheBitless</title>
  <link rel="icon" type="image/png" href="website/assets/logo-mark.png">
  <link rel="stylesheet" href="website/styles.css">
  <script>
    (function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>

  <h1 class="sr-only">TheBitless — Software Engineering Team</h1>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand" aria-label="TheBitless — home">
        <img src="website/assets/logo-mark.png" alt="TheBitless" class="brand-logo">
      </a>

      <div class="phases" role="tablist" aria-label="Fasi del progetto" data-home="index.html">
        <button class="phase-tab is-active" data-phase="rtb" role="tab" aria-selected="true" tabindex="0">RTB</button>
        <!-- Sezione Candidatura nascosta (non eliminata): per riattivarla, togliere il commento dal pulsante. -->
        <!-- <button class="phase-tab" data-phase="candidatura" role="tab" aria-selected="false" tabindex="-1">Candidatura</button> -->
        <button class="phase-tab" data-phase="diari" role="tab" aria-selected="false" tabindex="-1">Diapositive</button>
      </div>

      <div class="navbar-links">
        <a href="#team" class="nav-link">Chi siamo</a>
        <a href="website/glossario.html" class="nav-link">Glossario</a>
      </div>
    </div>
  </nav>

  <main>

    <!-- Lettera di presentazione: messa in evidenza fuori dai documenti, popolata da javascript.js. -->
    <div id="lettera-banner" class="lettera-banner" hidden></div>

    <!-- Proof of Concept: riquadro a parte in alto (archivio ZIP), popolato da javascript.js. -->
    <div id="poc-banner" class="poc-banner" hidden></div>

    <div id="phase-panel" class="phase-panel" role="tabpanel" aria-label="Documenti della fase selezionata">
      <p class="doc-empty">Caricamento documenti…</p>
    </div>

  </main>

  <footer id="team">
    <h2 class="team-heading">Chi siamo</h2>
    <div class="team-grid" id="team-grid"></div>
    <div class="footer-top">
      <div class="footer-info">
        <a href="https://github.com/thebitless-group-swe" class="footer-link" target="_blank" rel="noopener">github.com/thebitless-group-swe ↗</a>
        <a href="mailto:thebitless.swe@gmail.com" class="footer-link">thebitless.swe@gmail.com</a>
      </div>
      <button id="theme-toggle" class="theme-btn" aria-label="Passa alla modalità scura">
        <span class="theme-icon theme-icon--light">☀︎</span>
        <span class="theme-icon theme-icon--dark">☽</span>
      </button>
    </div>
  </footer>

  <script src="website/javascript.js"></script>
</body>
</html>
