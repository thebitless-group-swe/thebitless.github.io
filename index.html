<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheBitless</title>
  <link rel="stylesheet" href="website/styles.css">
  <script>
    (function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>

  <main>

    <div class="logo-wrap">
      <img src="website/assets/logo.png" alt="TheBitless">
    </div>

    <details id="candidatura" data-section="candidatura" class="section" open>
      <summary class="section-head">
        <span class="section-title">Candidatura</span>
        <span class="chevron" aria-hidden="true">+</span>
      </summary>
      <div class="section-body"></div>
    </details>

    <details id="rtb" data-section="rtb" class="section" open>
      <summary class="section-head">
        <span class="section-title">RTB</span>
        <span class="chevron" aria-hidden="true">+</span>
      </summary>
      <div class="section-body"></div>
    </details>

    <details id="diapositive" data-section="diapositive" class="section" open>
      <summary class="section-head">
        <span class="section-title">Diapositive</span>
        <span class="chevron" aria-hidden="true">+</span>
      </summary>
      <div class="section-body"></div>
    </details>

  </main>

  <footer>
    <div class="footer-top">
      <div class="footer-info">
        <a href="https://github.com/thebitless-group-swe" class="footer-link" target="_blank" rel="noopener">github.com/thebitless-group-swe ↗</a>
        <a href="mailto:thebitless.swe@gmail.com" class="footer-link">thebitless.swe@gmail.com</a>
      </div>
      <button id="theme-toggle" class="theme-btn" aria-label="Passa alla modalità scura">
        <span class="theme-icon theme-icon--light">☀︎</span>
        <span class="theme-icon theme-icon--dark">☽</span>
      </button>
    </div>
    <div class="team-grid" id="team-grid"></div>
  </footer>

  <script src="website/javascript.js"></script>
</body>
</html>
