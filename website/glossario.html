<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glossario — TheBitless</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    (function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-brand">TheBitless</a>
      <div class="navbar-links">
        <a href="glossario.html" class="nav-link active">Glossario</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="glossary-header">
      <h1 class="glossary-title">Glossario</h1>
      <p class="glossary-subtitle">Definizioni dei termini tecnici e metodologici usati nel progetto.</p>
    </div>

    <div class="search-wrap">
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Cerca un termine..."
        aria-label="Cerca nel glossario"
        autocomplete="off"
      >
    </div>

    <div class="glossary-grid" id="glossary-grid"></div>
  </main>

  <footer>
    <div class="footer-top">
      <div class="footer-info">
        <a href="https://github.com/thebitless-group-swe" class="footer-link" target="_blank" rel="noopener">github.com/thebitless-group-swe ↗</a>
        <a href="mailto:thebitless.swe@gmail.com" class="footer-link">thebitless.swe@gmail.com</a>
      </div>
      <button id="theme-toggle" class="theme-btn" aria-label="Passa alla modalità scura">
        <span class="theme-icon theme-icon--light">☀︎</span>
        <span class="theme-icon theme-icon--dark">☽</span>
      </button>
    </div>
    <div class="team-grid" id="team-grid"></div>
  </footer>

  <script src="javascript.js"></script>
  <script src="glossario.js"></script>
</body>
</html>
